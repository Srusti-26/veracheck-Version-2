version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      LLM_MODEL: google/flan-t5-base
      EMBEDDING_MODEL: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      HIGH_SIM_THRESHOLD: "0.85"
      MID_SIM_THRESHOLD: "0.60"
      FEED_POSTS_PER_SECOND: "2.0"
      ALLOWED_ORIGINS: '["http://localhost:3001","https://veracheck-frontend.up.railway.app"]'
    volumes:
      - ./data:/app/data
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  model_cache:
